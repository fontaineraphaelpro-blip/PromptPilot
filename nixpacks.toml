[variables]
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
# npm ci échoue avec les optional deps bundle (emnapi) — npm install est plus fiable sur Linux
cmds = ["npm install --no-audit --no-fund"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "node scripts/start-production.mjs"
